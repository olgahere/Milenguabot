<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Italiano Tetris</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #fafaf8;
    --card: #ffffff;
    --accent: #4f7cff;
    --accent-light: #e8edff;
    --text: #2a2a2a;
    --text-dim: #8a8a8a;
    --success: #34c759;
    --error: #ff6b6b;
    --border: #ececec;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: auto; min-height: 100%;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 16px 32px;
    /* ВАЖНО: разрешаем вертикальную прокрутку, чтобы ничего не обрезалось,
       даже если Telegram не успел развернуть окно на полный экран */
    overflow-x: hidden; overflow-y: auto;
  }
  .header {
    width: 100%; max-width: 420px; display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 10px;
  }
  .progress-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; margin: 0 12px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width .4s ease; border-radius: 4px; }
  .stat { font-size: 14px; color: var(--text-dim); font-weight: 600; white-space: nowrap; }
  .score { font-size: 14px; font-weight: 700; color: var(--accent); }

  /* Уменьшенная высота игровой зоны, чтобы корзины гарантированно влезали
     даже в свёрнутом (не fullscreen) состоянии Telegram */
  .game-area {
    width: 100%; max-width: 420px; height: 290px; background: var(--card);
    border-radius: 20px; position: relative; overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.04); border: 1px solid var(--border);
  }
  .falling-word {
    position: absolute; left: 50%; transform: translateX(-50%);
    background: var(--accent-light); color: var(--accent);
    padding: 12px 24px; border-radius: 14px; font-size: 20px; font-weight: 700;
    top: -60px; transition: top linear; white-space: nowrap;
  }
  .baskets {
    position: absolute; bottom: 10px; left: 0; right: 0;
    display: flex; gap: 8px; padding: 0 10px;
  }
  .basket {
    flex: 1; background: var(--bg); border: 2px solid var(--border);
    border-radius: 14px; padding: 12px 6px; text-align: center;
    font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer;
    transition: all .15s ease; user-select: none;
  }
  .basket:active { transform: scale(0.96); }
  .basket.correct { background: var(--success); border-color: var(--success); color: white; }
  .basket.wrong { background: var(--error); border-color: var(--error); color: white; }

  /* Экран сборки предложения */
  .sentence-area {
    width: 100%; max-width: 420px; background: var(--card);
    border-radius: 20px; padding: 20px 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.04);
    border: 1px solid var(--border); display: none;
  }
  .sentence-prompt { font-size: 14px; color: var(--text-dim); margin-bottom: 6px; }
  .sentence-ru { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .sentence-slots {
    min-height: 46px; border: 2px dashed var(--border); border-radius: 12px;
    padding: 8px; display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
  }
  .sentence-pool { display: flex; flex-wrap: wrap; gap: 8px; }
  .word-chip {
    background: var(--accent-light); color: var(--accent); font-weight: 700;
    padding: 10px 14px; border-radius: 10px; font-size: 15px; cursor: pointer; user-select: none;
  }
  .word-chip.placed { background: var(--card); color: var(--text); border: 2px solid var(--border); }
  .word-chip:active { transform: scale(0.95); }
  .sentence-check-btn {
    margin-top: 14px; width: 100%; background: var(--accent); color: white; border: none;
    padding: 12px; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer;
  }

  .round-end { width: 100%; max-width: 420px; text-align: center; margin-top: 30px; }
  .round-end h2 { font-size: 26px; margin-bottom: 8px; }
  .round-end p { color: var(--text-dim); font-size: 15px; margin-bottom: 24px; }
  .btn {
    background: var(--accent); color: white; border: none; padding: 16px 32px;
    border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; width: 100%;
    max-width: 420px; margin-bottom: 10px;
  }
  .btn:active { opacity: 0.85; }
  .btn.secondary { background: var(--bg); color: var(--accent); border: 2px solid var(--accent); }
  .example-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 14px; margin-top: 12px; width: 100%; max-width: 420px; text-align: left;
    display: none;
  }
  .example-card .it { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .example-card .ru { color: var(--text-dim); font-size: 13px; }
  .hidden { display: none !important; }

  .level-screen { width: 100%; max-width: 420px; padding-top: 16px; }
  .level-screen h1 { font-size: 24px; margin-bottom: 4px; }
  .level-screen .sub { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; }
  .level-card {
    background: var(--card); border: 2px solid var(--border); border-radius: 16px;
    padding: 16px; margin-bottom: 10px; cursor: pointer; display: flex;
    justify-content: space-between; align-items: center; transition: all .15s ease;
  }
  .level-card:active { transform: scale(0.98); }
  .level-card .name { font-size: 17px; font-weight: 700; }
  .level-card .desc { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  .level-card .badge {
    background: var(--accent-light); color: var(--accent); font-weight: 700;
    font-size: 13px; padding: 6px 12px; border-radius: 10px; white-space: nowrap;
  }
</style>
</head>
<body>

<div id="level-screen" class="level-screen">
  <h1>🇮🇹 Italiano Tetris</h1>
  <div class="sub">Выбери уровень и начни раунд (5 слов, ~5 минут)</div>
  <div id="level-list"></div>
</div>

<div id="game-screen" class="hidden">
  <div class="header">
    <div class="stat" id="round-label">Слово 1/5</div>
    <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>
    <div class="score" id="score">⭐ 0</div>
  </div>

  <div class="game-area" id="game-area">
    <div class="falling-word" id="falling-word">ciao</div>
    <div class="baskets" id="baskets"></div>
  </div>

  <div class="sentence-area" id="sentence-area">
    <div class="sentence-prompt">Собери предложение по-итальянски:</div>
    <div class="sentence-ru" id="sentence-ru"></div>
    <div class="sentence-slots" id="sentence-slots"></div>
    <div class="sentence-pool" id="sentence-pool"></div>
    <button class="sentence-check-btn" id="sentence-check-btn">Проверить</button>
  </div>

  <div class="example-card" id="example-card">
    <div class="it" id="example-it"></div>
    <div class="ru" id="example-ru"></div>
  </div>
</div>

<div id="end-screen" class="round-end hidden">
  <h2>🎉 Раунд пройден!</h2>
  <p id="end-stats">Ты выучил 5 слов</p>
  <button class="btn" onclick="startRound()">Ещё раунд (этот уровень)</button>
  <button class="btn secondary" onclick="showLevelScreen()">Выбрать другой уровень</button>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  if (tg.requestFullscreen) { try { tg.requestFullscreen(); } catch (e) {} }
  if (tg.disableVerticalSwipes) { tg.disableVerticalSwipes(); }
  tg.onEvent('viewportChanged', () => tg.expand());
  window.addEventListener('load', () => tg.expand());
  let tries = 0;
  const retryTimer = setInterval(() => {
    tg.expand(); tries++;
    if (tries > 8) clearInterval(retryTimer);
  }, 150);
}

const LEVELS = [
  { key: "A1", name: "A1 — Начальный", desc: "Базовые глаголы и бытовые фразы" },
  { key: "A2", name: "A2 — Элементарный", desc: "Повседневное общение" },
  { key: "B1", name: "B1 — Средний", desc: "Мнения, рассуждения" },
  { key: "B2", name: "B2 — Выше среднего", desc: "Сложные конструкции" }
];

let WORD_BANK = {};
let currentLevel = localStorage.getItem('it_level') || 'A1';
let order = [], current = 0, score = 0, fallTimer = null;
let sentenceSlots = []; // выбранные чипы в текущем порядке

async function loadWords() {
  const res = await fetch('words.json');
  WORD_BANK = await res.json();
  renderLevelList();
}

function getProgress(levelKey) {
  return parseInt(localStorage.getItem('it_progress_' + levelKey) || '0', 10);
}
function setProgress(levelKey, learned) {
  localStorage.setItem('it_progress_' + levelKey, String(learned));
}

function renderLevelList() {
  const list = document.getElementById('level-list');
  list.innerHTML = '';
  LEVELS.forEach(lvl => {
    const total = (WORD_BANK[lvl.key] || []).length;
    const learned = Math.min(getProgress(lvl.key), total);
    const card = document.createElement('div');
    card.className = 'level-card';
    card.onclick = () => { currentLevel = lvl.key; localStorage.setItem('it_level', lvl.key); startRound(); };
    card.innerHTML = `
      <div>
        <div class="name">${lvl.name}</div>
        <div class="desc">${lvl.desc}</div>
      </div>
      <div class="badge">${learned}/${total}</div>
    `;
    list.appendChild(card);
  });
}

function showLevelScreen() {
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('end-screen').classList.add('hidden');
  document.getElementById('level-screen').classList.remove('hidden');
  renderLevelList();
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startRound() {
  document.getElementById('level-screen').classList.add('hidden');
  document.getElementById('end-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');

  const pool = shuffle(WORD_BANK[currentLevel] || []);
  order = pool.slice(0, Math.min(5, pool.length));
  current = 0; score = 0;
  updateScore();
  nextWord();
}

function updateScore() {
  document.getElementById('score').textContent = `⭐ ${score}`;
}

function nextWord() {
  document.getElementById('example-card').style.display = 'none';
  document.getElementById('sentence-area').style.display = 'none';
  document.getElementById('game-area').style.display = 'block';

  if (current >= order.length) { endRound(); return; }

  const word = order[current];
  document.getElementById('round-label').textContent = `Слово ${current + 1}/${order.length} · ${currentLevel}`;
  document.getElementById('progress').style.width = `${(current / order.length) * 100}%`;

  const wordEl = document.getElementById('falling-word');
  wordEl.textContent = word.it;
  wordEl.style.transition = 'none';
  wordEl.style.top = '-60px';
  void wordEl.offsetWidth;
  wordEl.style.transition = `top ${getSpeed()}s linear`;

  const options = shuffle([word.ru, ...word.wrong]);
  const basketsEl = document.getElementById('baskets');
  basketsEl.innerHTML = '';
  options.forEach(opt => {
    const b = document.createElement('div');
    b.className = 'basket';
    b.textContent = opt;
    b.onclick = () => handleAnswer(opt === word.ru, b, word);
    basketsEl.appendChild(b);
  });

  requestAnimationFrame(() => { wordEl.style.top = '230px'; });

  clearTimeout(fallTimer);
  fallTimer = setTimeout(() => { handleAnswer(false, null, word); }, getSpeed() * 1000);
}

function getSpeed() { return 5; }

function handleAnswer(isCorrect, basketEl, word) {
  clearTimeout(fallTimer);
  document.querySelectorAll('.basket').forEach(b => b.onclick = null);
  if (basketEl) basketEl.classList.add(isCorrect ? 'correct' : 'wrong');

  if (isCorrect) {
    score += 10;
    updateScore();
    const learned = getProgress(currentLevel) + 1;
    setProgress(currentLevel, learned);
    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  } else {
    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
  }

  const card = document.getElementById('example-card');
  document.getElementById('example-it').textContent = word.example_it;
  document.getElementById('example-ru').textContent = word.example_ru;
  card.style.display = 'block';

  setTimeout(() => {
    // после каждого пойманного слова — мини-задание на сборку предложения
    showSentenceBuilder(word);
  }, 1400);
}

function showSentenceBuilder(word) {
  document.getElementById('example-card').style.display = 'none';
  document.getElementById('game-area').style.display = 'none';
  const area = document.getElementById('sentence-area');
  area.style.display = 'block';

  document.getElementById('sentence-ru').textContent = word.example_ru;

  // разбиваем итальянское предложение на токены (убираем финальную точку отдельно)
  const clean = word.example_it.replace(/[.!?]+$/, '');
  const endPunct = word.example_it.slice(clean.length);
  const tokens = clean.split(' ');

  sentenceSlots = [];
  const slotsEl = document.getElementById('sentence-slots');
  const poolEl = document.getElementById('sentence-pool');
  slotsEl.innerHTML = '';
  poolEl.innerHTML = '';

  const shuffledTokens = shuffle(tokens.map((t, i) => ({ t, id: i })));
  shuffledTokens.forEach(({ t, id }) => {
    const chip = document.createElement('div');
    chip.className = 'word-chip';
    chip.textContent = t;
    chip.dataset.id = id;
    chip.onclick = () => {
      if (chip.classList.contains('placed')) return;
      chip.classList.add('placed');
      const slotChip = document.createElement('div');
      slotChip.className = 'word-chip';
      slotChip.textContent = t;
      slotChip.onclick = () => {
        chip.classList.remove('placed');
        slotChip.remove();
        sentenceSlots = sentenceSlots.filter(s => s.id !== id);
      };
      slotsEl.appendChild(slotChip);
      sentenceSlots.push({ t, id });
    };
    poolEl.appendChild(chip);
  });

  document.getElementById('sentence-check-btn').onclick = () => {
    const built = sentenceSlots.map(s => s.t).join(' ') + endPunct;
    const correct = built.toLowerCase() === word.example_it.toLowerCase();
    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred(correct ? 'success' : 'error');
    if (correct) {
      score += 5;
      updateScore();
    }
    setTimeout(() => { current++; nextWord(); }, correct ? 700 : 1200);
  };
}

function endRound() {
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('end-screen').classList.remove('hidden');
  document.getElementById('end-stats').textContent = `Ты набрал ${score} очков из ${order.length * 15}`;
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

loadWords();
</script>
</body>
</html>
